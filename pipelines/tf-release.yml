# Parameterised Terraform release — one stack per run.
# Deploy order: _global → connectivity → mgmt → labs → avd
# SPNs / agents from docs/subscription-inventory.md (override via AzDo variables).

trigger: none

parameters:
  - name: envName
    displayName: Environment
    type: string
    default: int
    values:
      - int
      - prod
  - name: stackName
    displayName: Stack
    type: string
    default: connectivity
    values:
      - _global
      - connectivity
      - mgmt
      - labs
      - avd
  - name: action
    displayName: Action
    type: string
    default: plan
    values:
      - plan
      - apply
      - destroy

variables:
  - name: azureServiceConnection
    ${{ if eq(parameters.envName, 'int') }}:
      value: SC-R-VDI-INT-C-01
    ${{ if eq(parameters.envName, 'prod') }}:
      value: SC-P-VDI-PRD-C-01
  - name: agentPool
    ${{ if eq(parameters.envName, 'int') }}:
      value: uks-int-vdi-mgmt-vss-01
    ${{ if eq(parameters.envName, 'prod') }}:
      value: uks-prd-vdi-mgmt-vss-01
  # Backend — set in AzDo variable group or override here
  - name: tfBackendResourceGroup
    value: $(tf.backend.resourceGroup)
  - name: tfBackendStorageAccount
    value: $(tf.backend.storageAccount)
  - name: tfBackendContainer
    value: tfstate
  - name: stackWorkingDirectory
    ${{ if eq(parameters.stackName, '_global') }}:
      value: environments/_global
    ${{ else }}:
      value: environments/${{ parameters.envName }}/${{ parameters.stackName }}

stages:
  - stage: terraform
    displayName: Terraform ${{ parameters.action }} ${{ parameters.envName }}/${{ parameters.stackName }}
    jobs:
      - template: templates/terraform-stack.yml
        parameters:
          envName: ${{ parameters.envName }}
          stackName: ${{ parameters.stackName }}
          azureServiceConnection: $(azureServiceConnection)
          agentPool: $(agentPool)
          tfBackendResourceGroup: $(tfBackendResourceGroup)
          tfBackendStorageAccount: $(tfBackendStorageAccount)
          tfBackendContainer: $(tfBackendContainer)
          action: ${{ parameters.action }}
          workingDirectory: $(stackWorkingDirectory)
